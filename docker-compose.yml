# RMT — production Docker Compose stack.
#
# Managed by scripts/install.sh (first run) and scripts/update.sh (upgrades).
# All secrets are read from /opt/rmt/.env which is generated by install.sh.

services:
  postgres:
    image: postgres:17-alpine
    container_name: rmt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - rmt

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rmt-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: ${DATABASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      GODADDY_API_KEY: ${GODADDY_API_KEY:-}
      GODADDY_API_SECRET: ${GODADDY_API_SECRET:-}
      GODADDY_API_BASE: ${GODADDY_API_BASE:-https://api.godaddy.com}
      COMBELL_API_KEY: ${COMBELL_API_KEY:-}
      COMBELL_API_SECRET: ${COMBELL_API_SECRET:-}
      COMBELL_API_BASE: ${COMBELL_API_BASE:-https://api.combell.com}
      PUBLIC_FQDN: ${PUBLIC_FQDN}
    networks:
      - rmt

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: rmt-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      FQDN: ${PUBLIC_FQDN}
      SSL_ENABLED: ${SSL_ENABLED:-false}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only mount of the host's Let's Encrypt cert directory.
      # Present even when SSL is disabled so enabling it later requires
      # no compose edits.
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    networks:
      - rmt

volumes:
  postgres-data:
  certbot-webroot:

networks:
  rmt:
    driver: bridge
